<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Household Kiosk</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <div id="app">
            <section class="screen active" id="screen-clock">
                <div class="panel">
                    <div class="big-line" id="clock-greeting">
                        Friday afternoon
                    </div>
                    <div class="clock-time" id="clock-time">2:45 pm</div>
                    <div class="sub-line" id="clock-date">April 3, 2026</div>
                </div>
            </section>

            <section class="screen" id="screen-weather">
                <div class="panel">
                    <div class="screen-title">Weather</div>
                    <div class="weather-layout">
                        <div class="weather-current">
                            <div class="weather-city" id="weather-city">
                                Loading location…
                            </div>
                            <div class="weather-temp" id="weather-temp">
                                --°
                            </div>
                            <div class="weather-summary" id="weather-summary">
                                Loading weather…
                            </div>
                            <div class="weather-details" id="weather-details">
                                Fetching current conditions and forecast.
                            </div>
                        </div>
                        <div class="weather-forecast">
                            <div class="forecast-title">5-Day Forecast</div>
                            <div class="forecast-list" id="forecast-list">
                                <div class="loading">Loading forecast…</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="screen" id="screen-events">
                <div class="panel">
                    <div class="screen-title">Upcoming Events</div>
                    <div class="events-card">
                        <div class="events-list" id="events-list">
                            <div class="loading">Loading events…</div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="footer-status" id="footer-status">Screen 1 / 3</div>
        </div>

        <script type="text/javascript" src="/scripts.js" defer></script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Household Kiosk</title>
        <style>
            :root {
                --bg1: #0f172a;
                --bg2: #1e293b;
                --panel: rgba(255, 255, 255, 0.08);
                --text: #f8fafc;
                --muted: #cbd5e1;
                --accent: #38bdf8;
                --shadow: rgba(0, 0, 0, 0.35);
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                overflow: hidden;
                background: linear-gradient(135deg, var(--bg1), var(--bg2));
                color: var(--text);
                font-family: Inter, Arial, Helvetica, sans-serif;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #app {
                position: relative;
                width: 1920px;
                height: 1080px;
                overflow: hidden;
                background:
                    radial-gradient(
                        circle at top right,
                        rgba(56, 189, 248, 0.18),
                        transparent 25%
                    ),
                    radial-gradient(
                        circle at bottom left,
                        rgba(14, 165, 233, 0.16),
                        transparent 28%
                    ),
                    linear-gradient(135deg, #0b1220, #111827 45%, #0f172a 100%);
            }

            .screen {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 96px 96px;
                opacity: 0;
                transform: scale(1.02);
                transition:
                    opacity 700ms ease,
                    transform 700ms ease;
                pointer-events: none;
            }

            .screen.active {
                opacity: 1;
                transform: scale(1);
                pointer-events: auto;
            }

            .panel {
                width: 100%;
                height: 100%;
                border-radius: 36px;
                background: var(--panel);
                box-shadow: 0 24px 80px var(--shadow);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 48px 64px;
            }

            .big-line {
                font-size: 110px;
                line-height: 1.1;
                font-weight: 800;
                text-align: center;
                margin: 14px 0;
            }

            .clock-time {
                font-size: 230px;
                line-height: 1;
                font-weight: 800;
                text-align: center;
                margin: 18px 0;
                letter-spacing: -0.04em;
            }

            .sub-line {
                font-size: 74px;
                line-height: 1.2;
                color: var(--muted);
                text-align: center;
                margin-top: 18px;
            }

            .weather-layout {
                display: grid;
                grid-template-columns: 1.2fr 1fr;
                gap: 40px;
                width: 100%;
                align-items: stretch;
            }

            .weather-current,
            .weather-forecast,
            .events-card {
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 28px;
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
            }

            .weather-current {
                padding: 36px 40px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                min-height: 700px;
            }

            .weather-city {
                font-size: 42px;
                color: var(--muted);
                margin-bottom: 18px;
            }

            .weather-temp {
                font-size: 180px;
                font-weight: 800;
                line-height: 1;
                margin-bottom: 8px;
                letter-spacing: -0.04em;
            }

            .weather-summary {
                font-size: 60px;
                font-weight: 700;
                margin-bottom: 28px;
            }

            .weather-details {
                font-size: 34px;
                color: var(--muted);
                line-height: 1.5;
            }

            .weather-forecast {
                padding: 28px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                min-height: 700px;
            }

            .forecast-title {
                font-size: 42px;
                font-weight: 800;
                margin-bottom: 12px;
            }

            .forecast-list {
                display: grid;
                grid-template-rows: repeat(5, 1fr);
                gap: 14px;
                flex: 1;
            }

            .forecast-row {
                display: grid;
                grid-template-columns: 1fr 1.2fr auto;
                gap: 12px;
                align-items: center;
                font-size: 36px;
                padding: 18px 20px;
                border-radius: 20px;
                background: rgba(255, 255, 255, 0.04);
            }

            .forecast-day {
                font-weight: 700;
            }
            .forecast-desc {
                color: var(--muted);
            }
            .forecast-temps {
                font-weight: 700;
                text-align: right;
            }

            .screen-title {
                width: 100%;
                font-size: 62px;
                font-weight: 800;
                margin-bottom: 34px;
                text-align: left;
            }

            .events-card {
                width: 100%;
                height: 100%;
                padding: 32px 36px;
            }

            .events-list {
                display: flex;
                flex-direction: column;
                gap: 18px;
                margin-top: 18px;
            }

            .event-row {
                display: grid;
                grid-template-columns: 280px 1fr;
                gap: 24px;
                align-items: center;
                padding: 22px 24px;
                border-radius: 22px;
                background: rgba(255, 255, 255, 0.04);
            }

            .event-when {
                font-size: 34px;
                font-weight: 700;
                color: var(--accent);
                line-height: 1.3;
            }

            .event-main {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .event-title {
                font-size: 44px;
                font-weight: 800;
                line-height: 1.2;
            }

            .event-meta {
                font-size: 30px;
                color: var(--muted);
                line-height: 1.4;
                display: -webkit-box;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 3;
                overflow: hidden;
                text-overflow: ellipsis;
                max-height: calc(1.4em * 3);
            }

            .footer-status {
                position: absolute;
                bottom: 26px;
                right: 34px;
                font-size: 22px;
                color: rgba(255, 255, 255, 0.65);
                letter-spacing: 0.04em;
            }

            .loading,
            .error,
            .empty {
                color: var(--muted);
                font-size: 38px;
                text-align: center;
                line-height: 1.4;
                margin-top: 32px;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <section class="screen active" id="screen-clock">
                <div class="panel">
                    <div class="big-line" id="clock-greeting">
                        Friday afternoon
                    </div>
                    <div class="clock-time" id="clock-time">2:45 pm</div>
                    <div class="sub-line" id="clock-date">April 3, 2026</div>
                </div>
            </section>

            <section class="screen" id="screen-weather">
                <div class="panel">
                    <div class="screen-title">Weather</div>
                    <div class="weather-layout">
                        <div class="weather-current">
                            <div class="weather-city" id="weather-city">
                                Loading location…
                            </div>
                            <div class="weather-temp" id="weather-temp">
                                --°
                            </div>
                            <div class="weather-summary" id="weather-summary">
                                Loading weather…
                            </div>
                            <div class="weather-details" id="weather-details">
                                Fetching current conditions and forecast.
                            </div>
                        </div>
                        <div class="weather-forecast">
                            <div class="forecast-title">5-Day Forecast</div>
                            <div class="forecast-list" id="forecast-list">
                                <div class="loading">Loading forecast…</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="screen" id="screen-events">
                <div class="panel">
                    <div class="screen-title">Upcoming Events</div>
                    <div class="events-card">
                        <div class="events-list" id="events-list">
                            <div class="loading">Loading events…</div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="footer-status" id="footer-status">Screen 1 / 3</div>
        </div>

        <script>
            const SCREEN_DURATION_MS = 8000;
            const WEATHER_REFRESH_MS = 15 * 60 * 1000;
            const EVENTS_REFRESH_MS = 15 * 60 * 1000;
            const EVENTS_TO_SHOW = 6;
            const LOCAL_CALENDAR_ICS_URL = "/calendar.ics";
            const LOCAL_CONFIG_URL = "/config.json";

            const SCREENS = Array.from(document.querySelectorAll(".screen"));
            const footerStatus = document.getElementById("footer-status");

            const state = {
                activeScreenIndex: 0,
                config: {
                    locationName: "Saint Paul, Minnesota",
                    latitude: 44.9537,
                    longitude: -93.09,
                    timezone: "America/Chicago",
                },
                weather: null,
                events: [],
            };

            async function fetchConfig() {
                const response = await fetch(LOCAL_CONFIG_URL, {
                    cache: "no-store",
                });
                if (!response.ok) {
                    throw new Error(
                        `Config request failed: ${response.status}`,
                    );
                }
                const config = await response.json();
                state.config = {
                    ...state.config,
                    ...config,
                };
                document.getElementById("weather-city").textContent =
                    state.config.locationName;
            }

            function getPartOfDay(date) {
                const hour = date.getHours();
                if (hour < 5) return "night";
                if (hour < 12) return "morning";
                if (hour < 17) return "afternoon";
                if (hour < 21) return "evening";
                return "night";
            }

            function formatClockTime(date) {
                return new Intl.DateTimeFormat("en-US", {
                    hour: "numeric",
                    minute: "2-digit",
                    timeZone: state.config.timezone,
                })
                    .format(date)
                    .toLowerCase();
            }

            function updateClockScreen() {
                const now = new Date();
                const weekday = new Intl.DateTimeFormat("en-US", {
                    weekday: "long",
                    timeZone: state.config.timezone,
                }).format(now);
                const fullDate = new Intl.DateTimeFormat("en-US", {
                    month: "long",
                    day: "numeric",
                    year: "numeric",
                    timeZone: state.config.timezone,
                }).format(now);

                const localHour = Number(
                    new Intl.DateTimeFormat("en-US", {
                        hour: "numeric",
                        hourCycle: "h23",
                        timeZone: state.config.timezone,
                    }).format(now),
                );

                document.getElementById("clock-greeting").textContent =
                    `${weekday} ${getPartOfDay({ getHours: () => localHour })}`;
                document.getElementById("clock-time").textContent =
                    formatClockTime(now);
                document.getElementById("clock-date").textContent = fullDate;
            }

            function showScreen(index) {
                SCREENS.forEach((screen, i) => {
                    screen.classList.toggle("active", i === index);
                });
                footerStatus.textContent = `Screen ${index + 1} / ${SCREENS.length}`;
            }

            function startScreenRotation() {
                setInterval(() => {
                    state.activeScreenIndex =
                        (state.activeScreenIndex + 1) % SCREENS.length;
                    showScreen(state.activeScreenIndex);
                }, SCREEN_DURATION_MS);
            }

            function weatherCodeToDescription(code) {
                const map = {
                    0: "Clear sky",
                    1: "Mostly clear",
                    2: "Partly cloudy",
                    3: "Overcast",
                    45: "Fog",
                    48: "Rime fog",
                    51: "Light drizzle",
                    53: "Drizzle",
                    55: "Dense drizzle",
                    56: "Freezing drizzle",
                    57: "Dense freezing drizzle",
                    61: "Light rain",
                    63: "Rain",
                    65: "Heavy rain",
                    66: "Freezing rain",
                    67: "Heavy freezing rain",
                    71: "Light snow",
                    73: "Snow",
                    75: "Heavy snow",
                    77: "Snow grains",
                    80: "Rain showers",
                    81: "Rain showers",
                    82: "Heavy showers",
                    85: "Snow showers",
                    86: "Heavy snow showers",
                    95: "Thunderstorm",
                    96: "Thunderstorm with hail",
                    99: "Severe thunderstorm",
                };
                return map[code] || "Unknown";
            }

            function formatTemp(value) {
                return `${Math.round(value)}°`;
            }

            async function fetchWeather() {
                try {
                    const url = new URL(
                        "https://api.open-meteo.com/v1/forecast",
                    );
                    url.searchParams.set("latitude", state.config.latitude);
                    url.searchParams.set("longitude", state.config.longitude);
                    url.searchParams.set(
                        "current",
                        "temperature_2m,weather_code,wind_speed_10m,apparent_temperature",
                    );
                    url.searchParams.set(
                        "daily",
                        "weather_code,temperature_2m_max,temperature_2m_min",
                    );
                    url.searchParams.set("temperature_unit", "fahrenheit");
                    url.searchParams.set("wind_speed_unit", "mph");
                    url.searchParams.set("timezone", state.config.timezone);
                    url.searchParams.set("forecast_days", "5");

                    const response = await fetch(url);
                    if (!response.ok)
                        throw new Error(
                            `Weather request failed: ${response.status}`,
                        );
                    state.weather = await response.json();
                    renderWeather();
                } catch (error) {
                    console.error(error);
                    renderWeatherError();
                }
            }

            function renderWeather() {
                if (!state.weather) return;

                const current = state.weather.current;
                const daily = state.weather.daily;
                document.getElementById("weather-city").textContent =
                    state.config.locationName;
                document.getElementById("weather-temp").textContent =
                    formatTemp(current.temperature_2m);
                document.getElementById("weather-summary").textContent =
                    weatherCodeToDescription(current.weather_code);
                document.getElementById("weather-details").innerHTML = [
                    `Feels like ${formatTemp(current.apparent_temperature)}`,
                    `Wind ${Math.round(current.wind_speed_10m)} mph`,
                ].join("<br>");

                const forecastList = document.getElementById("forecast-list");
                forecastList.innerHTML = "";

                daily.time.forEach((day, index) => {
                    const row = document.createElement("div");
                    row.className = "forecast-row";
                    const dayName = new Intl.DateTimeFormat("en-US", {
                        weekday: "short",
                        timeZone: state.config.timezone,
                    }).format(new Date(`${day}T12:00:00`));
                    row.innerHTML = `
          <div class="forecast-day">${dayName}</div>
          <div class="forecast-desc">${weatherCodeToDescription(daily.weather_code[index])}</div>
          <div class="forecast-temps">${formatTemp(daily.temperature_2m_max[index])} / ${formatTemp(daily.temperature_2m_min[index])}</div>
        `;
                    forecastList.appendChild(row);
                });
            }

            function renderWeatherError() {
                document.getElementById("weather-temp").textContent = "--°";
                document.getElementById("weather-summary").textContent =
                    "Weather unavailable";
                document.getElementById("weather-details").textContent =
                    "Could not load current conditions.";
                document.getElementById("forecast-list").innerHTML =
                    '<div class="error">Could not load forecast.</div>';
            }

            async function fetchEvents() {
                try {
                    const response = await fetch(LOCAL_CALENDAR_ICS_URL, {
                        cache: "no-store",
                    });
                    if (!response.ok)
                        throw new Error(
                            `Calendar request failed: ${response.status}`,
                        );
                    const icsText = await response.text();
                    state.events = parseUpcomingEventsFromICS(icsText);
                    renderEvents();
                } catch (error) {
                    console.error(error);
                    renderEventsError();
                }
            }

            function parseUpcomingEventsFromICS(icsText) {
                const unfolded = icsText
                    .replace(/\r\n[ \t]/g, "")
                    .replace(/\n[ \t]/g, "");
                const blocks = unfolded
                    .split("BEGIN:VEVENT")
                    .slice(1)
                    .map((block) => block.split("END:VEVENT")[0]);
                const now = new Date();
                const events = [];

                for (const block of blocks) {
                    const lines = block
                        .split(/\r?\n/)
                        .map((line) => line.trim())
                        .filter(Boolean);
                    const event = {};

                    for (const line of lines) {
                        const separatorIndex = line.indexOf(":");
                        if (separatorIndex === -1) continue;
                        const rawKey = line.slice(0, separatorIndex);
                        const value = line.slice(separatorIndex + 1);
                        const key = rawKey.split(";")[0];
                        event[key] = value;
                    }

                    const startInfo = extractDateValue(lines, "DTSTART");
                    const endInfo = extractDateValue(lines, "DTEND");
                    const title = decodeICSText(
                        event.SUMMARY || "Untitled event",
                    );
                    const location = decodeICSText(event.LOCATION || "");
                    const description = decodeICSText(event.DESCRIPTION || "");

                    if (!startInfo) continue;

                    const start = parseICSDate(
                        startInfo.value,
                        startInfo.params,
                    );
                    const end = endInfo
                        ? parseICSDate(endInfo.value, endInfo.params)
                        : null;
                    if (!start || (end && end < now) || (!end && start < now))
                        continue;

                    events.push({
                        title,
                        location,
                        description,
                        start,
                        end,
                        isAllDay: startInfo.params.includes("VALUE=DATE"),
                    });
                }

                events.sort((a, b) => a.start - b.start);
                return events.slice(0, EVENTS_TO_SHOW);
            }

            function extractDateValue(lines, prefix) {
                const target = lines.find((line) => line.startsWith(prefix));
                if (!target) return null;
                const separatorIndex = target.indexOf(":");
                const rawKey = target.slice(0, separatorIndex);
                const value = target.slice(separatorIndex + 1);
                const params = rawKey.split(";").slice(1);
                return { value, params };
            }

            function parseICSDate(value, params = []) {
                if (!value) return null;
                const isDateOnly =
                    params.includes("VALUE=DATE") || /^\d{8}$/.test(value);
                if (isDateOnly) {
                    const year = Number(value.slice(0, 4));
                    const month = Number(value.slice(4, 6)) - 1;
                    const day = Number(value.slice(6, 8));
                    return new Date(year, month, day, 0, 0, 0);
                }

                if (value.endsWith("Z")) {
                    const iso = `${value.slice(0, 4)}-${value.slice(4, 6)}-${value.slice(6, 8)}T${value.slice(9, 11)}:${value.slice(11, 13)}:${value.slice(13, 15)}Z`;
                    return new Date(iso);
                }

                const year = Number(value.slice(0, 4));
                const month = Number(value.slice(4, 6)) - 1;
                const day = Number(value.slice(6, 8));
                const hour = Number(value.slice(9, 11));
                const minute = Number(value.slice(11, 13));
                const second = Number(value.slice(13, 15) || 0);
                return new Date(year, month, day, hour, minute, second);
            }

            function decodeICSText(value) {
                return value
                    .replace(/\\n/g, " ")
                    .replace(/\\,/g, ",")
                    .replace(/\\;/g, ";")
                    .replace(/\\\\/g, "\\")
                    .trim();
            }

            function formatEventDateTime(date, isAllDay) {
                const day = new Intl.DateTimeFormat("en-US", {
                    weekday: "short",
                    month: "short",
                    day: "numeric",
                    timeZone: state.config.timezone,
                }).format(date);
                const time = isAllDay
                    ? "All day"
                    : new Intl.DateTimeFormat("en-US", {
                          hour: "numeric",
                          minute: "2-digit",
                          timeZone: state.config.timezone,
                      })
                          .format(date)
                          .toLowerCase();
                return { day, time };
            }

            function renderEvents() {
                const container = document.getElementById("events-list");
                container.innerHTML = "";

                if (!state.events.length) {
                    container.innerHTML =
                        '<div class="empty">No upcoming events found.</div>';
                    return;
                }

                state.events.forEach((event) => {
                    const when = formatEventDateTime(
                        event.start,
                        event.isAllDay,
                    );
                    const metaParts = [];
                    if (event.location) metaParts.push(event.location);
                    if (event.description) metaParts.push(event.description);

                    const row = document.createElement("div");
                    row.className = "event-row";
                    row.innerHTML = `
          <div class="event-when">${when.day}<br>${when.time}</div>
          <div class="event-main">
            <div class="event-title">${escapeHtml(event.title)}</div>
            <div class="event-meta">${escapeHtml(metaParts.join(" · ") || "Calendar event")}</div>
          </div>
        `;
                    container.appendChild(row);
                });
            }

            function renderEventsError() {
                document.getElementById("events-list").innerHTML =
                    '<div class="error">Could not load Google Calendar events from the local calendar proxy.</div>';
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function startClock() {
                updateClockScreen();
                setInterval(updateClockScreen, 1000);
            }

            function startDataRefresh() {
                fetchWeather();
                fetchEvents();
                setInterval(fetchWeather, WEATHER_REFRESH_MS);
                setInterval(fetchEvents, EVENTS_REFRESH_MS);
            }

            async function init() {
                showScreen(state.activeScreenIndex);
                try {
                    await fetchConfig();
                } catch (error) {
                    console.error(error);
                }
                startClock();
                startScreenRotation();
                startDataRefresh();
            }

            init();
        </script>
    </body>
</html>
